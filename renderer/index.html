<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaVoIP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #25d366;
      --red:    #ef4444;
      --yellow: #f59e0b;
      --blue:   #3b82f6;
      --bg:     #0d0d0d;
      --surface:#161616;
      --border: #222;
      --muted:  #555;
      --text:   #f0f0f0;
      --text2:  #999;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo { font-size: 20px; font-weight: 700; color: var(--green); }
    .logo span { color: var(--text); }

    #status-bar { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text2); }
    #status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background .3s; }
    #status-dot.connecting { background: var(--yellow); }
    #status-dot.open       { background: var(--green); }
    #status-dot.error      { background: var(--red); }

    /* ── Tabs ── */
    nav {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    nav button {
      flex: 1;
      padding: 11px 0;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text2);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: color .2s, border-color .2s;
    }

    nav button.active { color: var(--green); border-bottom-color: var(--green); }
    nav button:hover  { color: var(--text); }

    /* ── Pages ── */
    .page { display: none; flex: 1; overflow-y: auto; padding: 20px; flex-direction: column; gap: 16px; }
    .page.active { display: flex; }

    /* ── Incoming overlay ── */
    #incoming-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #incoming-overlay.show { display: flex; }

    #incoming-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px;
      text-align: center;
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      animation: pop .2s ease;
    }

    @keyframes pop { from { transform: scale(.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    #incoming-card .label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; }
    #incoming-from { font-size: 22px; font-weight: 700; }
    .incoming-btns { display: flex; gap: 10px; margin-top: 6px; }

    /* ── Buttons ── */
    .btn {
      padding: 12px 16px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      width: 100%;
    }
    .btn:active  { transform: scale(.97); }
    .btn:disabled { opacity: .3; cursor: not-allowed; }

    .btn-green  { background: var(--green); color: #000; }
    .btn-red    { background: var(--red);   color: #fff; }
    .btn-ghost  { background: var(--border); color: var(--text); }
    .btn-icon   { width: auto; padding: 8px 12px; font-size: 13px; }

    /* ── Dialpad page ── */
    #page-dialpad { align-items: center; }

    #phone-input {
      width: 100%; max-width: 320px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 22px;
      font-weight: 300;
      outline: none;
      text-align: center;
      letter-spacing: 2px;
    }
    #phone-input:focus { border-color: var(--green); }
    #phone-input::placeholder { color: var(--muted); font-size: 14px; letter-spacing: 0; font-weight: 400; }

    #call-controls { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 320px; }

    #btn-call { display: block; }
    #btn-end  { display: none; }
    #btn-mute { display: none; }

    /* QR */
    #qr-section { display: none; flex-direction: column; align-items: center; gap: 10px; }
    #qr-section p { font-size: 12px; color: var(--text2); }
    #qr-canvas { background: #fff; border-radius: 10px; padding: 10px; }

    /* ── Contacts page ── */
    .search-bar {
      display: flex; gap: 8px;
    }
    .search-bar input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    .search-bar input:focus { border-color: var(--green); }

    .contact-form {
      display: none;
      flex-direction: column;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .contact-form.show { display: flex; }
    .contact-form input {
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    .contact-form input:focus { border-color: var(--green); }
    .contact-form-btns { display: flex; gap: 8px; }

    #contacts-list { display: flex; flex-direction: column; gap: 6px; }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: border-color .2s;
    }
    .contact-item:hover { border-color: #333; }

    .contact-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--green);
      color: #000;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px;
      flex-shrink: 0;
    }

    .contact-info { flex: 1; min-width: 0; }
    .contact-name { font-size: 14px; font-weight: 600; }
    .contact-number { font-size: 12px; color: var(--text2); margin-top: 2px; }

    .contact-actions { display: flex; gap: 6px; }
    .contact-actions button {
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text2);
      font-size: 12px;
      cursor: pointer;
      transition: color .2s, border-color .2s;
    }
    .contact-actions button:hover { color: var(--text); border-color: #444; }
    .contact-actions .btn-call-contact { color: var(--green); border-color: var(--green); }

    /* ── History page ── */
    #history-list { display: flex; flex-direction: column; gap: 6px; }

    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .history-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }
    .history-icon.recebida  { background: rgba(37,211,102,.15); color: var(--green); }
    .history-icon.realizada { background: rgba(59,130,246,.15); color: var(--blue); }
    .history-icon.perdida   { background: rgba(239,68,68,.15);  color: var(--red); }

    .history-info { flex: 1; min-width: 0; }
    .history-name   { font-size: 14px; font-weight: 600; }
    .history-number { font-size: 12px; color: var(--text2); margin-top: 1px; }
    .history-meta   { font-size: 11px; color: var(--muted); margin-top: 3px; }

    .history-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: .4px;
      text-transform: uppercase;
    }
    .badge-atendida   { background: rgba(37,211,102,.15); color: var(--green); }
    .badge-perdida    { background: rgba(239,68,68,.15);  color: var(--red); }
    .badge-nao-atend  { background: rgba(245,158,11,.15); color: var(--yellow); }

    .history-item.perdida   { border-left: 3px solid var(--red); }
    .history-item.atendida  { border-left: 3px solid var(--green); }
    .history-item.nao-atend { border-left: 3px solid var(--yellow); }

    .btn-return {
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--green);
      background: none;
      color: var(--green);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    /* ── Dashboard page ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .stat-icon { font-size: 22px; }
    .stat-value { font-size: 32px; font-weight: 700; line-height: 1; }
    .stat-label { font-size: 12px; color: var(--text2); }

    .stat-card.green  { border-color: rgba(37,211,102,.3); }
    .stat-card.red    { border-color: rgba(239,68,68,.3); }
    .stat-card.blue   { border-color: rgba(59,130,246,.3); }
    .stat-card.yellow { border-color: rgba(245,158,11,.3); }

    .stat-card.green  .stat-value { color: var(--green); }
    .stat-card.red    .stat-value { color: var(--red); }
    .stat-card.blue   .stat-value { color: var(--blue); }
    .stat-card.yellow .stat-value { color: var(--yellow); }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    /* ── Log ── */
    #log {
      width: 100%; max-width: 320px;
      height: 80px;
      overflow-y: auto;
      background: #0a0a0a;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 11px;
      font-family: "Consolas", monospace;
      color: var(--muted);
    }
    #log .entry { margin-bottom: 2px; }
    #log .entry.ok   { color: var(--green); }
    #log .entry.err  { color: var(--red); }
    #log .entry.info { color: #60a5fa; }

    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 32px 0;
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">Wa<span>VoIP</span></div>
  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">Inicializando...</span>
  </div>
</header>

<!-- Tabs -->
<nav>
  <button class="active" data-tab="dialpad">📞 Teclado</button>
  <button data-tab="contacts">👥 Contatos</button>
  <button data-tab="history">🕐 Histórico</button>
  <button data-tab="dashboard">📊 Dashboard</button>
</nav>

<!-- Incoming call overlay -->
<div id="incoming-overlay">
  <div id="incoming-card">
    <div class="label">Chamada recebida</div>
    <div id="incoming-from">—</div>
    <div class="incoming-btns">
      <button class="btn btn-green" id="btn-accept">Atender</button>
      <button class="btn btn-red"   id="btn-reject">Recusar</button>
    </div>
  </div>
</div>

<!-- Page: Dialpad -->
<div class="page active" id="page-dialpad">
  <div id="qr-section">
    <p>Escaneie o QR Code no WhatsApp</p>
    <canvas id="qr-canvas" width="180" height="180"></canvas>
  </div>

  <input id="phone-input" type="tel" placeholder="Digite o número..." />

  <div id="call-controls">
    <button class="btn btn-green" id="btn-call">Ligar</button>
    <button class="btn btn-ghost" id="btn-mute">Mutar</button>
    <button class="btn btn-red"   id="btn-end">Encerrar</button>
  </div>

  <div id="log"></div>
</div>

<!-- Page: Contacts -->
<div class="page" id="page-contacts">
  <div class="search-bar">
    <input id="contact-search" placeholder="Buscar contato..." />
    <button class="btn btn-green btn-icon" id="btn-new-contact">+ Novo</button>
  </div>

  <div class="contact-form" id="contact-form">
    <input id="form-nome"   placeholder="Nome" />
    <input id="form-numero" placeholder="Número (+5511...)" />
    <div class="contact-form-btns">
      <button class="btn btn-green" id="btn-save-contact">Salvar</button>
      <button class="btn btn-ghost" id="btn-cancel-contact">Cancelar</button>
    </div>
  </div>

  <div id="contacts-list"></div>
</div>

<!-- Page: History -->
<div class="page" id="page-history">
  <div id="history-list"></div>
</div>

<!-- Page: Dashboard -->
<div class="page" id="page-dashboard">
  <div class="section-title">Resumo geral</div>
  <div class="stats-grid">
    <div class="stat-card green">
      <div class="stat-icon">✅</div>
      <div class="stat-value" id="stat-atendidas">—</div>
      <div class="stat-label">Recebidas atendidas</div>
    </div>
    <div class="stat-card red">
      <div class="stat-icon">📵</div>
      <div class="stat-value" id="stat-perdidas">—</div>
      <div class="stat-label">Perdidas</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-icon">📤</div>
      <div class="stat-value" id="stat-realizadas">—</div>
      <div class="stat-label">Realizadas atendidas</div>
    </div>
    <div class="stat-card yellow">
      <div class="stat-icon">⏱</div>
      <div class="stat-value" id="stat-duracao">—</div>
      <div class="stat-label">Duração média (s)</div>
    </div>
    <div class="stat-card" style="border-color:rgba(245,158,11,.3); grid-column: span 2;">
      <div class="stat-icon">📤</div>
      <div style="display:flex;gap:32px;align-items:baseline">
        <div>
          <div class="stat-value" id="stat-realizadas-nao" style="color:var(--yellow)">—</div>
          <div class="stat-label">Realizadas não atendidas</div>
        </div>
        <div>
          <div class="stat-value" id="stat-total" style="color:var(--text2);font-size:22px">—</div>
          <div class="stat-label">Total de chamadas</div>
        </div>
      </div>
    </div>
  </div>

  <div class="section-title" style="margin-top:8px">Últimas ligações</div>
  <div id="dashboard-recent"></div>
</div>

<script src="bundle.js"></script>
</body>
</html>
